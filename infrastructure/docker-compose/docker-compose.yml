version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: market-predict-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_predict
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: market-predict-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: market-predict-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/market_predict?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  realtime:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.realtime
    container_name: market-predict-realtime
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WS_PORT: 4001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    ports:
      - "4001:4001"
    depends_on:
      redis:
        condition: service_healthy

  ai-engine:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.ai-engine
    container_name: market-predict-ai-engine
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/market_predict
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_WS_URL: ws://localhost:4001
    container_name: market-predict-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  admin:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_WS_URL: ws://localhost:4001
    container_name: market-predict-admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: market-predict-nginx
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - admin
      - api
      - realtime

volumes:
  postgres_data:
  redis_data:
